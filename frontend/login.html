<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Recovery ERP – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --brand:#0f766e;
  --brand-dark:#0d5f58;
  --brand-light:#ccfbf1;
  --surface:#ffffff;
  --bg:#f0faf9;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Sora',sans-serif;
  background:linear-gradient(135deg, #0f766e 0%, #0d5f58 50%, #134e48 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-container{
  width:100%;
  max-width:440px;
}

.form-wrap{
  background:var(--surface);
  border-radius:24px;
  padding:40px 36px;
  box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
}

.form-top{
  text-align:center;
  margin-bottom:32px;
}

.form-top h2{
  font-size:28px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.4px;
  margin-bottom:8px;
}

.form-top p{
  font-size:14px;
  color:var(--muted);
}

.alert{
  display:none;
  padding:12px 14px;
  border-radius:12px;
  font-size:13px;
  font-weight:500;
  margin-bottom:24px;
  align-items:center;
  gap:10px;
}

.alert.show{
  display:flex;
}

.alert.error{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#991b1b;
}

.alert.success{
  background:#f0fdf4;
  border:1px solid #bbf7d0;
  color:#166534;
}

.alert.info{
  background:#fffbeb;
  border:1px solid #fde68a;
  color:#92400e;
}

.field{
  margin-bottom:20px;
}

label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:var(--text);
  margin-bottom:8px;
  letter-spacing:0.2px;
}

.inp-wrap{
  position:relative;
}

.inp-wrap .ic{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:#94a3b8;
  font-size:14px;
  pointer-events:none;
}

input[type=text], input[type=password]{
  width:100%;
  padding:12px 40px 12px 42px;
  border:1.5px solid var(--border);
  border-radius:12px;
  font-family:'Sora',sans-serif;
  font-size:14px;
  color:var(--text);
  background:#fafbfc;
  outline:none;
  transition:all 0.2s;
}

input:focus{
  border-color:var(--brand);
  background:#fff;
  box-shadow:0 0 0 3px rgba(15,118,110,0.1);
}

.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  cursor:pointer;
  color:#94a3b8;
  font-size:14px;
  padding:4px;
}

.eye:hover{
  color:var(--brand);
}

.opts{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
}

.rem{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color:var(--muted);
  cursor:pointer;
}

.rem input{
  width:16px;
  height:16px;
  accent-color:var(--brand);
  cursor:pointer;
}

.fgt{
  font-size:13px;
  color:var(--brand);
  text-decoration:none;
  font-weight:500;
  transition:color 0.2s;
}

.fgt:hover{
  text-decoration:underline;
  color:var(--brand-dark);
}

.sub-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:var(--brand);
  color:#fff;
  font-family:'Sora',sans-serif;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:all 0.2s;
}

.sub-btn:hover{
  background:var(--brand-dark);
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(15,118,110,0.22);
}

.sub-btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

@media(max-width:480px){
  .form-wrap{
    padding:32px 24px;
  }
  
  .form-top h2{
    font-size:24px;
  }
}
</style>
</head>
<body>
<div class="login-container">
  <div class="form-wrap">
    <div class="form-top">
      <h2>Welcome back</h2>
      <p>Sign in to your ERP dashboard</p>
    </div>
    
    <div class="alert" id="alertBox">
      <i id="alertIcon"></i>
      <span id="alertText"></span>
    </div>
    
    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>Username</label>
        <div class="inp-wrap">
          <i class="fas fa-user ic"></i>
          <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      
      <div class="field">
        <label>Password</label>
        <div class="inp-wrap">
          <i class="fas fa-lock ic"></i>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
          <button type="button" class="eye" onclick="togglePwd()">
            <i class="fas fa-eye" id="eyeIc"></i>
          </button>
        </div>
      </div>
      
      <div class="opts">
        <label class="rem">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#" class="fgt" onclick="showForgot(event)">Forgot password?</a>
      </div>
      
      <button type="submit" class="sub-btn" id="loginBtn">
        <span>Sign In</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>
  </div>
</div>

<script>
function togglePwd(){
  const p=document.getElementById('password');
  const i=document.getElementById('eyeIc');
  if(p.type==='password'){
    p.type='text';
    i.className='fas fa-eye-slash';
  } else {
    p.type='password';
    i.className='fas fa-eye';
  }
}

function showA(msg,type='error'){
  const b=document.getElementById('alertBox');
  const i=document.getElementById('alertIcon');
  const t=document.getElementById('alertText');
  b.className='alert show '+type;
  t.textContent=msg;
  i.className=type==='error'?'fas fa-exclamation-circle':type==='success'?'fas fa-check-circle':'fas fa-info-circle';
}

function hideA(){
  document.getElementById('alertBox').className='alert';
}

function showForgot(e){
  e.preventDefault();
  showA('Contact your system administrator to reset your password.','info');
}

async function handleLogin(e){
  e.preventDefault();
  hideA();
  
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const r=document.getElementById('remember').checked;
  const btn=document.getElementById('loginBtn');
  
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Authenticating…';
  
  try{
    const res=await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body:JSON.stringify({username:u,password:p,remember:r})
    });
    
    const data=await res.json();
    
    if(res.ok){
      showA('Login successful! Redirecting…','success');
      setTimeout(()=>{
        window.location.href=data.redirect || '/';
      },500);
    } else {
      showA(data.error || 'Invalid credentials');
      btn.disabled=false;
      btn.innerHTML='<span>Sign In</span><i class="fas fa-arrow-right"></i>';
    }
  } catch(err){
    showA('Network error. Please try again.');
    btn.disabled=false;
    btn.innerHTML='<span>Sign In</span><i class="fas fa-arrow-right"></i>';
  }
}
</script>
</body>
</html>
