<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leaves - Profit Recovery ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #0f172a;
            --dark-sidebar: #0c1a19;
            --dark-sidebar-hover: #122e2b;
            --dark-sidebar-active: #163d39;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--light-gray); color: var(--dark); }
        
        .sidebar {
            width: 280px;
            background: var(--dark-sidebar);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar-brand { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-brand h2 { color: white; font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .sidebar-brand h2 i { color: var(--primary); }
        .sidebar-brand p { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 0.25rem; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 0.25rem; padding: 1rem; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; color: rgba(255,255,255,0.7); text-decoration: none; border-radius: 8px; font-size: 0.9rem; }
        .nav-item i { width: 20px; }
        .nav-item:hover { background: var(--dark-sidebar-hover); color: white; }
        .nav-item.active { background: var(--dark-sidebar-active); color: white; border-left: 3px solid var(--primary); }
        .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); background: var(--dark-sidebar); }
        .user-info { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
        .user-avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; }
        .user-name { font-weight: 600; color: white; font-size: 0.9rem; }
        .user-role { font-size: 0.7rem; opacity: 0.6; color: rgba(255,255,255,0.6); }
        .logout-btn { width: 100%; padding: 0.75rem; background: rgba(239,68,68,0.2); border: none; border-radius: 8px; color: #ef4444; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        
        .main-content { margin-left: 280px; padding: 2rem; min-height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-size: 1.75rem; font-weight: 700; }
        .page-title p { color: var(--gray); font-size: 0.85rem; margin-top: 0.25rem; }
        .date-badge { background: var(--white); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; color: var(--gray); border: 1px solid var(--border); }
        
        /* Announcement Banner */
        .announcement-banner {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left: 4px solid var(--warning);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 1rem;
            animation: slideDown 0.3s ease;
        }
        .announcement-banner.show { display: flex; }
        .announcement-banner i { font-size: 1.5rem; color: #d97706; }
        .announcement-content { flex: 1; }
        .announcement-title { font-weight: 600; color: #92400e; margin-bottom: 0.25rem; }
        .announcement-message { color: #78350f; font-size: 0.9rem; }
        .announcement-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #92400e; }
        
        .balance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .balance-card {
            background: var(--white);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
        }
        .balance-card h4 { font-size: 0.75rem; color: var(--gray); margin-bottom: 0.5rem; }
        .balance-number { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .leave-table-container {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .leave-table {
            width: 100%;
            border-collapse: collapse;
        }
        .leave-table th {
            text-align: left;
            padding: 1rem;
            background: var(--light-gray);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--gray);
            border-bottom: 1px solid var(--border);
        }
        .leave-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-cancelled { background: #e2e3e5; color: #6c757d; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--white);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .close-btn { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--gray); }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; }
        
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
        }
        .toast {
            background: var(--white);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.5rem;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--success);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand"><h2><i class="fas fa-chart-line"></i> Profit Recovery ERP</h2><p>Employee Self Service</p></div>
        <div class="sidebar-nav">
            
            <a href="/employee/profile" class="nav-item"><i class="fas fa-user-circle"></i><span>My Profile</span></a>
            <a href="/employee/attendance" class="nav-item"><i class="fas fa-calendar-check"></i><span>My Attendance</span></a>
            <a href="/employee/leaves" class="nav-item active"><i class="fas fa-umbrella-beach"></i><span>My Leaves</span></a>
        </div>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-details">
                    <div class="user-name" id="userName">Employee</div>
                    <div class="user-role" id="userRole">Employee</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>My Leaves</h1>
                <p>View leave balance, request new leaves, and track approvals</p>
            </div>
            <div class="date-badge" id="currentDate"></div>
        </div>

        

        <!-- Leave Balance Cards -->
        <div class="balance-grid" id="balanceGrid"></div>

        <!-- Leave History Table -->
        <div class="leave-table-container">
            <div style="padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
                <h3><i class="fas fa-history"></i> Leave History</h3>
                <button class="btn btn-primary" onclick="openRequestModal()">
                    <i class="fas fa-plus"></i> Request Leave
                </button>
            </div>
            <table class="leave-table">
                <thead>
                    <tr>
                        <th>Leave Type</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Days</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Approved By</th>
                    </tr>
                </thead>
                <tbody id="leavesTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Request Leave Modal -->
    <div class="modal" id="leaveModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-umbrella-beach"></i> Request Leave</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="leaveForm">
                    <div class="form-group">
                        <label>Leave Type *</label>
                        <select id="leaveType" required>
                            <option value="annual">Annual Leave</option>
                            <option value="sick">Sick Leave</option>
                            <option value="casual">Casual Leave</option>
                            <option value="unpaid">Unpaid Leave</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Date *</label>
                        <input type="date" id="startDate" required onchange="calculateDays()">
                    </div>
                    <div class="form-group">
                        <label>End Date *</label>
                        <input type="date" id="endDate" required onchange="calculateDays()">
                    </div>
                    <div class="form-group">
                        <label>Total Days</label>
                        <input type="number" id="totalDays" readonly>
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <textarea id="reason" rows="3" placeholder="Please provide reason for leave..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitLeave()">Submit Request</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let currentEmployeeId = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function checkAuth() {
            const response = await fetch('/api/check-auth');
            const data = await response.json();
            if (!data.authenticated) window.location.href = '/login';
            document.getElementById('userName').textContent = data.user.full_name;
            document.getElementById('userAvatar').textContent = data.user.full_name.charAt(0);
            document.getElementById('userRole').textContent = data.user.role.replace('_', ' ').toUpperCase();
        }

        async function loadEmployeeProfile() {
            const response = await fetch('/api/employee/profile');
            const emp = await response.json();
            currentEmployeeId = emp.id;
        }

        async function loadLeaveBalances() {
            const response = await fetch('/api/employee/attendance/stats');
            const data = await response.json();
            
            document.getElementById('balanceGrid').innerHTML = `
                <div class="balance-card"><h4>Annual Leave</h4><div class="balance-number">${data.leave_balance || 12}</div><div>Available days</div></div>
                <div class="balance-card"><h4>Sick Leave</h4><div class="balance-number">10</div><div>Available days</div></div>
                <div class="balance-card"><h4>Casual Leave</h4><div class="balance-number">8</div><div>Available days</div></div>
                <div class="balance-card"><h4>Pending Requests</h4><div class="balance-number">${data.pending_leaves || 0}</div><div>Awaiting approval</div></div>
            `;
        }

        async function loadLeaveHistory() {
    const response = await fetch('/api/employee/leaves/recent?limit=50');
    const leaves = await response.json();
    
    const tbody = document.getElementById('leavesTable');
    if (!leaves || leaves.length === 0) {
        tbody.innerHTML = '发展<td colspan="7" style="text-align: center; padding: 2rem; color: var(--gray);"><i class="fas fa-calendar"></i> No leave requests found发展</tr>';
        return;
    }
    
    tbody.innerHTML = leaves.map(leave => {
        let statusClass = '';
        let statusText = '';
        
        // ADD CANCELLED STATUS HERE
        if (leave.status === 'pending') { 
            statusClass = 'status-pending'; 
            statusText = 'PENDING'; 
        }
        else if (leave.status === 'approved') { 
            statusClass = 'status-approved'; 
            statusText = 'APPROVED'; 
        }
        else if (leave.status === 'rejected') { 
            statusClass = 'status-rejected'; 
            statusText = 'REJECTED'; 
        }
        else if (leave.status === 'cancelled') { 
            statusClass = 'status-cancelled'; 
            statusText = 'CANCELLED'; 
        }
        
        const approvedBy = leave.approved_by_name || (leave.status === 'approved' ? 'HR Manager' : '-');
        
        return `
            <tr>
                <td>${leave.leave_type ? leave.leave_type.toUpperCase() : '-'}</td>
                <td>${leave.start_date || '-'}</td>
                <td>${leave.end_date || '-'}</td>
                <td>${leave.total_days}</td>
                <td>${leave.reason || '-'}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>${approvedBy}</td>
            </tr>
        `;
    }).join('');
}
        async function loadAnnouncement() {
            const response = await fetch('/api/hr/announcements/latest');
            const data = await response.json();
            
            if (data.message && !localStorage.getItem('announcement_seen_' + data.id)) {
                document.getElementById('announcementMessage').textContent = data.message;
                document.getElementById('announcementBanner').classList.add('show');
            }
        }

        function closeAnnouncement() {
            document.getElementById('announcementBanner').classList.remove('show');
            localStorage.setItem('announcement_seen_' + Date.now(), 'true');
        }

        function calculateDays() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (start && end) {
                const diff = (new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24) + 1;
                document.getElementById('totalDays').value = diff;
            }
        }

        function openRequestModal() {
            document.getElementById('leaveForm').reset();
            document.getElementById('leaveModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('leaveModal').classList.remove('active');
        }

        async function submitLeave() {
            const data = {
                leave_type: document.getElementById('leaveType').value,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value,
                total_days: document.getElementById('totalDays').value,
                reason: document.getElementById('reason').value
            };
            
            if (!data.start_date || !data.end_date) {
                showToast('Please select dates', 'error');
                return;
            }
            
            if (data.total_days <= 0) {
                showToast('Invalid date range', 'error');
                return;
            }
            
            const response = await fetch('/api/employee/leave/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                showToast('Leave request submitted successfully');
                closeModal();
                loadLeaveHistory();
                loadLeaveBalances();
            } else {
                const error = await response.json();
                showToast(error.error || 'Failed to submit request', 'error');
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-IN', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        checkAuth();
        loadEmployeeProfile();
        loadLeaveBalances();
        loadLeaveHistory();
        loadAnnouncement();
        
        // Refresh every 30 seconds
        setInterval(() => {
            loadLeaveHistory();
            loadAnnouncement();
        }, 30000);
    </script>
</body>
</html>
